version: 0.1
primary_scene: 成人教育课程
description: >
  面向成年人，尤其是中老年人、退休/半退休人群、自由职业者、副业探索人群的线上课程、训练营、社群转化或知识付费场景。

# 二级类别（LLM 相关性判断与历史库对齐的权威标签）。投顾等强监管金融方向
# 单列「金融保险类」便于合规标记；历史库当前只有 兴趣类/副业类，后续补齐。
categories:
  - 兴趣类
  - 副业类
  - 金融保险类

# 纯 verdict 驱动的评分常量。LLM 不再输出数值分数；score.py 据此把分类结论
# 与结构化信号映射为最终分数。所有数字集中在此，便于统一调参。
scoring:
  base_match: 60
  base_uncertain: 30
  base_no_match: 0
  signal_weight: 5           # 每个信号 strength 的加减分权重
  signal_min: -20             # signal_bonus 下限
  signal_max: 25              # signal_bonus 上限
  category_bonus: 8           # LLM 给出非 null category
  consistency_bonus: 10       # LLM category == 历史先验 matched_category
  prior_bonus_max: 15         # 历史先验封顶
  match_threshold: 70         # match 判定通过线
  quality_low_threshold: 40   # 内容质量低于此值触发人工复核

global_positive_signals:
  - 课程
  - 训练营
  - 直播课
  - 录播课
  - 公开课
  - 报名
  - 学员
  - 老师
  - 导师
  - 社群
  - 零基础
  - 小白
  - 体验课
  - 付费课
  - 变现
  - 副业
  - 私域
  - 领取资料
  - 添加老师
  - 扫码进群

global_negative_signals:
  - 纯工具官网
  - 纯软件下载站
  - 纯资讯门户
  - 百科词条
  - 论坛社区
  - 云服务默认页
  - CDN资源域名
  - 统计分析域名
  - 支付域名
  - 登录页但无业务信息
  - 政府/高校继续教育官网但无商业课程转化

generic_tool_policy:
  default_penalty: 35
  note: 通用平台、云厂商、统计、CDN、支付、社区类域名默认降权，除非页面内容强烈证明其承载具体课程业务。
  signals:
    - aliyun
    - aliyuncs
    - tencentcloud
    - qcloud
    - baidu.com
    - cloudflare
    - cloudfront
    - cdn
    - cname
    - stats
    - analytics
    - tracking
    - paypal
    - stripe
    - alipay
    - wepay
    - weixin.qq.com
    - github.io
    - github.com
    - shopify
    - myshopify.com
    - wordpress.com
    - wixsite.com
    - wix.com
    - squarespace
    - webflow.io
    - notion.site
    - 免费建站
    - 自助建站
    - SaaS
    - 模板建站
    - 有赞
    - 微盟

